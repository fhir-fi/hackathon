<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 500"
  preserveAspectRatio="xMinYMid meet"
>
  <defs>
    <style>
      :root {
        --stroke-width: 14;
        --animation-duration: 7s;
      }
      path, rect, circle {
        fill: none;
        stroke: #09345A;
        stroke-width: var(--stroke-width);
        stroke-linecap: round;
        stroke-linejoin: round;
        shape-rendering: auto;
      }
      rect {
        rx: 5;
      }
      #plus {
        stroke: #EB5C18;
        stroke-width: 15;
        animation:
          var(--animation-duration) ease-in 0s infinite normal pulse;
      }
      #content {
        animation: var(--animation-duration) ease-in-out calc(var(--animation-duration) / 5) infinite normal brighten;
      }
      @keyframes pulse {
        0% {
          stroke-width: 15;
          stroke: #EB5C18;
        }
        60% {
          stroke-width: 15;
          stroke: #EB5C18;
        }
        70% {
          stroke-width: 18;
          stroke: #FA8230;
        }
        90% {
          stroke-width: 15;
          stroke: #EB5C18;
        }
      }
      @keyframes brighten {
        0% {
          stroke: #09345A;
        }
        55% {
          stroke: #09345A;
        }
        75% {
          stroke: #1268B4;
        }
        90% {
          stroke: #1A70BC;
        }
        100% {
          stroke: #09345A;
        }
      }
      @media (prefers-color-scheme: dark) {
        #plus {
          stroke: #C24A11;
        }
        @keyframes pulse {
          0% {
            stroke-width: 15;
            stroke: #C24A11;
          }
          60% {
            stroke-width: 15;
            stroke: #C24A11;
          }
          70% {
            stroke-width: 18;
          stroke: #EB5C18;
          }
          90% {
            stroke-width: 15;
            stroke: #C24A11;
          }
        }
      }
      @media (prefers-reduced-motion) {
        #plus, #content {
          animation: none;
        }
      }      
    </style>
  </defs>
  <rect id="screen" x="75" y="75" width="160" height="90" />
  <path id="stand" d="M155,165 v30 l-30,10 M155,195 l30,10" />
  <path id="content" d="M135,120 h40 M155,100 v40" />
  <path id="plus" d="M50,75 h50 M75,50 v50" />
  <circle cx="150" cy="130" r="250" />
</svg>